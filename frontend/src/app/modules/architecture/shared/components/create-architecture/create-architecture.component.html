<div class="container py-4">
 
  
  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary">Generate Architecture</h2>
    <p class="text-muted">
      Describe your project and let AI build the architecture for you
    </p>
  </div>
 
  
  <div *ngIf="errorMessage" class="alert alert-danger rounded-3 shadow-sm">
    {{ errorMessage }}
  </div>
 
  
  <div class="card shadow-lg border-0 rounded-4 p-4">
 
   
    <div class="mb-4">
      <label class="form-label fw-semibold">Project Title</label>
      <input
        type="text"
        class="form-control form-control-lg rounded-3"
        [(ngModel)]="projectTitle"
        placeholder="E.g. E-commerce Platform"
      />
    </div>
 
    
    <div class="mb-4">
      <label class="form-label fw-semibold">Project Description</label>
      <textarea
        class="form-control rounded-3"
        rows="4"
        [(ngModel)]="projectDescription"
        placeholder="Describe your project in detail..."
      ></textarea>
    </div>
 
    
    <div class="mb-4">
      <label class="form-label fw-semibold">Architecture Level</label>
      <select
        class="form-select form-select-lg rounded-3"
        [(ngModel)]="architectureLevel"
      >
        <option value="" disabled selected>
          Select architecture level
        </option>
        <option value="Tier1" [defaultSelected]="">Tier-1</option>
        <option value="Tier2">Tier-2</option>
        <option value="NTier">N Tier</option>
      </select>
    </div>
 
    
    <div class="mb-4">
      <label class="form-label fw-semibold">Your Requirements</label>
      <textarea
        class="form-control rounded-3"
        rows="5"
        [(ngModel)]="prompt"
        placeholder="List your specific requirements..."
      ></textarea>
    </div>
 
   
    <div class="bg-light rounded-4 p-3 mb-4 border">
      <h6 class="fw-bold mb-3 text-secondary">Fixed Tech Stack</h6>
 
      <span class="badge bg-primary me-2 px-3 py-2">Angular</span>
      <span class="badge bg-success me-2 px-3 py-2">ASP.NET Core</span>
      <span class="badge bg-dark px-3 py-2">SQL Server</span>
    </div>
 
    
    <button
      class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm"
      (click)="onGenerate()"
      [disabled]="isLoading"
    >
      <span
        *ngIf="isLoading"
        class="spinner-border spinner-border-sm me-2"
      ></span>
 
      {{ isLoading ? 'Generating Blueprint...' : 'Generate Architecture' }}
    </button>
 
  </div>
</div>
