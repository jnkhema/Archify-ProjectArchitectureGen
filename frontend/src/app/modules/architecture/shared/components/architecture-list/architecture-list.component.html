
<div *ngIf="isLoading" class="text-center py-4">
  <div class="spinner-border text-light"></div>
  <p class="text-light mt-2 mb-0">Loading projects...</p>
</div>
 

<div
  *ngIf="!isLoading && projects.length === 0"
  class="text-center text-light opacity-75 py-4">
 
  <p class="mb-1">No projects yet</p>
  <small>Create your first architecture</small>
</div>
 

<div *ngFor="let project of projects" class="project-card">
 
  <h6 class="fw-bold mb-1 text-white">
    {{ project.projectTitle }}
  </h6>
 
  <p class="small text-light opacity-75 mb-3">
    {{ project.createdAt | date:'mediumDate' }}
  </p>
 
  <div class="d-flex gap-2">
 
    <button
      class="btn btn-sm btn-light flex-fill fw-semibold"
      (click)="viewProject(project.architectureId)">
      View
    </button>
 
    <button
      class="btn btn-sm btn-outline-light flex-fill"
      (click)="editProject(project.architectureId)">
      Edit
    </button>
 
    <button
      class="btn btn-sm btn-outline-danger flex-fill"
      (click)="deleteProject(project.architectureId)">
      Delete
    </button>
 
  </div>
 
</div>
