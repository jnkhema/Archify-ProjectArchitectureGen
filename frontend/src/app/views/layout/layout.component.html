
 
<div class="d-flex vh-100">
 
  
  <div class="sidebar">
 
   
    <div class="mb-4">
      <h3 class="fw-bold text-white mb-0">
        <span class="me-2"></span>Archify
      </h3>
      <small class="text-light opacity-75">
        Design. Visualize. Build.
      </small>
    </div>
 
   
    <button class="btn btn-primary w-100 rounded-3 py-2 fw-semibold mb-4 shadow-sm" (click)="goToCreateProject()">
      + New Project
    </button>
 
    
    <h6 class="text-light opacity-75 mb-3">My Projects</h6>
 
    <div class="project-scroll">
      <app-architecture-list></app-architecture-list>
    </div>
 
    
 
  </div>
 
 
  <div class="flex-grow-1 d-flex flex-column main-section">
 
  
    <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 border-bottom">
      <div class="container-fluid p-0">
 
        <span class="navbar-brand fw-bold text-primary fs-4">
          Archify
        </span>
 
        <div class="d-flex align-items-center gap-3">
          <span class="text-muted">Welcome, {{ userName }}</span>
          <button
          class="btn btn-outline-danger rounded-3 px-4 fw-semibold"
          (click)="logout()">
          Logout
        </button>
        </div>
 
      </div>
    </nav>
 
   
    <div class="p-4 overflow-auto flex-grow-1">
      <router-outlet></router-outlet>
    </div>
 
  </div>
 
</div>
